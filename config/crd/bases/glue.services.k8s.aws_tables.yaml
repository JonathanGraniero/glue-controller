---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tables.glue.services.k8s.aws
spec:
  group: glue.services.k8s.aws
  names:
    kind: Table
    listKind: TableList
    plural: tables
    singular: table
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Table is the Schema for the Tables API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TableSpec defines the desired state of Table.

              Represents a collection of related data organized in columns and rows.
            properties:
              catalogID:
                description: |-
                  The ID of the Data Catalog in which the table resides. If none is provided,
                  the Amazon Web Services account ID is used by default.
                type: string
              databaseName:
                description: |-
                  The name of the catalog database that contains the target table. For Hive
                  compatibility, this name is entirely lowercase.
                type: string
              description:
                description: A description of the table.
                type: string
              name:
                description: |-
                  The table name. For Hive compatibility, this is folded to lowercase when it
                  is stored.
                type: string
              openTableFormatInput:
                description: |-
                  Specifies an open format table (e.g. Apache Iceberg) when creating the table.
                  This field is immutable after creation.
                properties:
                  icebergInput:
                    description: Specifies an Apache Iceberg metadata table.
                    properties:
                      metadataOperation:
                        description: A required metadata operation. The only allowed
                          value is "CREATE".
                        type: string
                      version:
                        description: The table version for the Iceberg table. Defaults
                          to 2.
                        type: string
                    required:
                    - metadataOperation
                    type: object
                type: object
              owner:
                description: |-
                  The table owner. Included for Apache Hive compatibility. Not used in the
                  normal course of Glue operations.
                type: string
              parameters:
                additionalProperties:
                  type: string
                description: These key-value pairs define properties associated with
                  the table.
                type: object
              partitionIndexes:
                description: |-
                  A list of partition indexes for the table. The controller reconciles this
                  list by calling CreatePartitionIndex for additions and DeletePartitionIndex
                  for removals. Indexes passed at creation time are created via CreateTableInput.
                items:
                  description: A structure for a partition index.
                  properties:
                    indexName:
                      description: The name of the partition index.
                      type: string
                    keys:
                      description: The keys (column names) for the partition index.
                      items:
                        type: string
                      type: array
                  required:
                  - indexName
                  - keys
                  type: object
                type: array
              partitionKeys:
                description: |-
                  A list of columns by which the table is partitioned. Only primitive types
                  are supported as partition keys.
                items:
                  description: A column in a Glue table.
                  properties:
                    comment:
                      type: string
                    name:
                      type: string
                    parameters:
                      additionalProperties:
                        type: string
                      type: object
                    type:
                      type: string
                  type: object
                type: array
              retention:
                description: The retention time for this table.
                format: int64
                type: integer
              storageDescriptor:
                description: |-
                  A storage descriptor containing information about the physical storage of
                  this table.
                properties:
                  additionalLocations:
                    items:
                      type: string
                    type: array
                  bucketColumns:
                    items:
                      type: string
                    type: array
                  columns:
                    items:
                      description: A column in a Glue table.
                      properties:
                        comment:
                          type: string
                        name:
                          type: string
                        parameters:
                          additionalProperties:
                            type: string
                          type: object
                        type:
                          type: string
                      type: object
                    type: array
                  compressed:
                    type: boolean
                  inputFormat:
                    type: string
                  location:
                    type: string
                  numberOfBuckets:
                    format: int64
                    type: integer
                  outputFormat:
                    type: string
                  parameters:
                    additionalProperties:
                      type: string
                    type: object
                  schemaReference:
                    description: An object that references a schema stored in the
                      Glue Schema Registry.
                    properties:
                      schemaID:
                        description: An object that contains schema identity fields.
                        properties:
                          registryName:
                            type: string
                          schemaARN:
                            type: string
                          schemaName:
                            type: string
                        type: object
                      schemaVersionID:
                        type: string
                      schemaVersionNumber:
                        format: int64
                        type: integer
                    type: object
                  serdeInfo:
                    description: |-
                      Information about a serialization/deserialization program (SerDe) that serves
                      as an extractor and loader.
                    properties:
                      name:
                        type: string
                      parameters:
                        additionalProperties:
                          type: string
                        type: object
                      serializationLibrary:
                        type: string
                    type: object
                  skewedInfo:
                    description: Specifies skewed values in a table.
                    properties:
                      skewedColumnNames:
                        items:
                          type: string
                        type: array
                      skewedColumnValueLocationMaps:
                        additionalProperties:
                          type: string
                        type: object
                      skewedColumnValues:
                        items:
                          type: string
                        type: array
                    type: object
                  sortColumns:
                    items:
                      description: Specifies the sort order of a sorted column.
                      properties:
                        column:
                          type: string
                        sortOrder:
                          format: int64
                          type: integer
                      type: object
                    type: array
                  storedAsSubDirectories:
                    type: boolean
                type: object
              tableType:
                description: |-
                  The type of this table. Glue will create tables with the EXTERNAL_TABLE type.
                  Other services, such as Athena, may create tables with additional table types.
                type: string
              targetTable:
                description: A TableIdentifier structure that describes a target table
                  for resource linking.
                properties:
                  catalogID:
                    type: string
                  databaseName:
                    type: string
                  name:
                    type: string
                  region:
                    type: string
                type: object
              viewExpandedText:
                description: |-
                  Included for Apache Hive compatibility. Not used in the normal course of
                  Glue operations.
                type: string
              viewOriginalText:
                description: |-
                  Included for Apache Hive compatibility. Not used in the normal course of
                  Glue operations. If the table is a VIRTUAL_VIEW, certain Athena configuration
                  encoded in base64.
                type: string
            required:
            - databaseName
            - name
            type: object
          status:
            description: TableStatus defines the observed state of Table
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
