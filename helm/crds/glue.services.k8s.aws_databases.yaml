---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: databases.glue.services.k8s.aws
spec:
  group: glue.services.k8s.aws
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the Databases API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DatabaseSpec defines the desired state of Database.

              The Database object represents a logical grouping of tables that might reside
              in a Hive metastore or an RDBMS.
            properties:
              catalogID:
                description: |-
                  The ID of the Data Catalog in which to create the database. If none is provided,
                  the Amazon Web Services account ID is used by default.

                  Regex Pattern: `^[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*$`
                type: string
              description:
                description: |-
                  A description of the database.

                  Regex Pattern: `^[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*$`
                type: string
              federatedDatabase:
                description: |-
                  A FederatedDatabase structure that references an entity outside the Glue
                  Data Catalog.
                properties:
                  connectionName:
                    type: string
                  identifier:
                    type: string
                type: object
              locationURI:
                description: |-
                  The location of the database (for example, an HDFS path).

                  Regex Pattern: `^[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*$`
                type: string
              name:
                description: |-
                  The name of the database. For Hive compatibility, this is folded to lowercase
                  when it is stored.

                  Regex Pattern: `^[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*$`
                type: string
              parameters:
                additionalProperties:
                  type: string
                description: These key-value pairs define parameters and properties
                  of the database.
                type: object
              tableDefaultPermissions:
                description: |-
                  Creates a set of default permissions on the table for principals. Used by
                  Lake Formation. Not used in the normal course of Glue operations.
                items:
                  description: Permissions granted to a principal.
                  properties:
                    permissions:
                      items:
                        type: string
                      type: array
                    principal:
                      description: The Lake Formation principal.
                      properties:
                        dataLakePrincipalIdentifier:
                          type: string
                      type: object
                  type: object
                type: array
              tags:
                additionalProperties:
                  type: string
                type: object
            type: object
          status:
            description: DatabaseStatus defines the observed state of Database
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
