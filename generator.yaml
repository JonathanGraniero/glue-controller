ignore:
  resource_names:
      - Blueprint
      - Catalog
      - Classifier
      - Connection
      - Crawler
      - CustomEntityType
      - DataQualityRuleset
      # - Database
      - DevEndpoint
      - Integration
      - IntegrationResourceProperty
      # - Job
      - MLTransform
      - Partition
      - PartitionIndex
      - Registry
      - Schema
      - Script
      - SecurityConfiguration
      - Session
      # - Table
      - TableOptimizer
      - Trigger
      - UsageProfile
      - UserDefinedFunction
      - Workflow
  shape_names:
      - KeySchemaElement
  field_paths:
      - Mapping.Children
      - CreateJobInput.AllocatedCapacity
      - UpdateJobInput.JobUpdate.AllocatedCapacity
      - CreateDatabaseInput.DatabaseInput
      - UpdateDatabaseInput.DatabaseInput
      - CreateTableInput.TableInput
      - UpdateTableInput.TableUpdate
      - CreateTableInput.TransactionId
      - UpdateTableInput.TransactionId
      - UpdateTableInput.SkipArchive
      - UpdateTableInput.VersionId
      - UpdateTableInput.ViewUpdateAction
      - UpdateTableInput.Force
resources:
  Job:
    renames:
      operations:
        GetJob:
          input_fields:
            JobName: Name
        UpdateJob:
          input_fields:
            JobName: Name
        DeleteJob:
          input_fields:
            JobName: Name
    fields:
      CodeGenConfigurationNodes.DynamicTransform.OutputSchemas.Columns.Type:
        go_tag: json:"type,omitempty"
      CodeGenConfigurationNodes.Filter.Filters.Values.Type:
        go_tag: json:"type,omitempty"
      CodeGenConfigurationNodes.DynamicTransform.Parameters.Type:
        go_tag: json:"type,omitempty"
      Role:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Tags:
        type: map[string]*string
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/job/sdk_update_pre_build_request.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/job/sdk_update_post_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/job/sdk_read_one_post_set_output.go.tpl
      sdk_file_end:
        template_path: hooks/job/sdk_file_end.go.tpl
    exceptions:
      terminal_codes:
        - InvalidInputException
      errors:
        404: 
         code: EntityNotFoundException
  Database:
    fields:
      Name:
        is_primary_key: true
        from:
          operation: GetDatabase
          path: Database.Name
      Description:
        from:
          operation: GetDatabase
          path: Database.Description
      LocationURI:
        from:
          operation: GetDatabase
          path: Database.LocationUri
      Parameters:
        from:
          operation: GetDatabase
          path: Database.Parameters
      CreateTableDefaultPermissions:
        from:
          operation: GetDatabase
          path: Database.CreateTableDefaultPermissions
      FederatedDatabase:
        from:
          operation: GetDatabase
          path: Database.FederatedDatabase
      Tags:
        type: map[string]*string
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/database/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/database/sdk_create_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/database/sdk_update_pre_build_request.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/database/sdk_update_post_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/database/sdk_read_one_post_set_output.go.tpl
      sdk_file_end:
        template_path: hooks/database/sdk_file_end.go.tpl
    exceptions:
      terminal_codes:
        - InvalidInputException
      errors:
        404:
         code: EntityNotFoundException
  Table:
    tags:
      ignore: true
    fields:
      Name:
        is_primary_key: true
        is_required: true
        from:
          operation: GetTable
          path: Table.Name
      CatalogID:
        compare:
          is_ignored: true
      DatabaseName:
        from:
          operation: GetTable
          path: Table.DatabaseName
      Description:
        from:
          operation: GetTable
          path: Table.Description
      Owner:
        from:
          operation: GetTable
          path: Table.Owner
      Parameters:
        from:
          operation: GetTable
          path: Table.Parameters
      OpenTableFormatInput:
        compare:
          is_ignored: true
      PartitionIndexes:
        compare:
          is_ignored: true
      PartitionKeys:
        from:
          operation: GetTable
          path: Table.PartitionKeys
      Retention:
        from:
          operation: GetTable
          path: Table.Retention
      StorageDescriptor:
        from:
          operation: GetTable
          path: Table.StorageDescriptor
      TableType:
        from:
          operation: GetTable
          path: Table.TableType
      TargetTable:
        from:
          operation: GetTable
          path: Table.TargetTable
      ViewExpandedText:
        from:
          operation: GetTable
          path: Table.ViewExpandedText
      ViewOriginalText:
        from:
          operation: GetTable
          path: Table.ViewOriginalText
      StorageDescriptor.Columns.Type:
        go_tag: json:"type,omitempty"
      PartitionKeys.Type:
        go_tag: json:"type,omitempty"
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/table/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/table/sdk_create_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/table/sdk_update_pre_build_request.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/table/sdk_update_post_build_request.go.tpl
      sdk_update_post_set_output:
        template_path: hooks/table/sdk_update_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/table/sdk_read_one_post_set_output.go.tpl
      sdk_file_end:
        template_path: hooks/table/sdk_file_end.go.tpl
      delta_post_compare:
        template_path: hooks/table/delta_post_compare.go.tpl
    exceptions:
      terminal_codes:
        - InvalidInputException
      errors:
        404:
         code: EntityNotFoundException


