ignore:
  resource_names:
      - Blueprint
      - Catalog
      - Classifier
      - Connection
      - Crawler
      - CustomEntityType
      - DataQualityRuleset
      # - Database
      - DevEndpoint
      - Integration
      - IntegrationResourceProperty
      # - Job
      - MLTransform
      - Partition
      - PartitionIndex
      - Registry
      - Schema
      - Script
      - SecurityConfiguration
      - Session
      - Table
      - TableOptimizer
      - Trigger
      - UsageProfile
      - UserDefinedFunction
      - Workflow
  shape_names:
      - Column
      - KeySchemaElement
  field_paths:
      - Mapping.Children
      - CreateJobInput.AllocatedCapacity
      - UpdateJobInput.JobUpdate.AllocatedCapacity
      - CreateDatabaseInput.DatabaseInput
      - UpdateDatabaseInput.DatabaseInput
resources:
  Job:
    renames:
      operations:
        GetJob:
          input_fields:
            JobName: Name
        UpdateJob:
          input_fields:
            JobName: Name
        DeleteJob:
          input_fields:
            JobName: Name
    fields:
      CodeGenConfigurationNodes.DynamicTransform.OutputSchemas.Columns.Type:
        go_tag: json:"type,omitempty"
      CodeGenConfigurationNodes.Filter.Filters.Values.Type:
        go_tag: json:"type,omitempty"
      CodeGenConfigurationNodes.DynamicTransform.Parameters.Type:
        go_tag: json:"type,omitempty"
      Role:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Tags:
        type: map[string]*string
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/job/sdk_update_pre_build_request.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/job/sdk_update_post_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/job/sdk_read_one_post_set_output.go.tpl
      sdk_file_end:
        template_path: hooks/job/sdk_file_end.go.tpl
    exceptions:
      terminal_codes:
        - InvalidInputException
      errors:
        404: 
         code: EntityNotFoundException
  Database:
    fields:
      Name:
        is_primary_key: true
        from:
          operation: GetDatabase
          path: Database.Name
      Description:
        from:
          operation: GetDatabase
          path: Database.Description
      LocationURI:
        from:
          operation: GetDatabase
          path: Database.LocationUri
      Parameters:
        from:
          operation: GetDatabase
          path: Database.Parameters
      CreateTableDefaultPermissions:
        from:
          operation: GetDatabase
          path: Database.CreateTableDefaultPermissions
      FederatedDatabase:
        from:
          operation: GetDatabase
          path: Database.FederatedDatabase
      Tags:
        type: map[string]*string
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/database/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/database/sdk_create_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/database/sdk_update_pre_build_request.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/database/sdk_update_post_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/database/sdk_read_one_post_set_output.go.tpl
      sdk_file_end:
        template_path: hooks/database/sdk_file_end.go.tpl
    exceptions:
      terminal_codes:
        - InvalidInputException
      errors:
        404: 
         code: EntityNotFoundException

      
